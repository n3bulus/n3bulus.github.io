<!DOCTYPE html>

<html>
<head>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <script>
        questions = [
            "What is your stange talent?",
            "What is your obssession these days?",
            "What do you like most about the work you do?",
            "Project you are more proud of",
            "What do your colleagues do not know about you?",
            "One thing everyone should try at least once",
            "What was your journey to arrive here?"
        ]
        function getquestion(){
            i = Math.round(Math.random()*6);
            document.getElementById("container").innerHTML = questions[i];
        }
    </script>

    <style>
    .square-container {
        text-align: center;
        position: relative; 
        overflow: hidden;
        }

    .unselectable {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

    .square {
        width: 800px;
        height: 800px;
        display: inline-block;
        border: 20px solid white;
        margin: 20px;
        color: white;
        vertical-align: bottom;
        font-weight: bold;
        padding: 20px
        }
    body{
        background-color: black;
    }
    </style>


</head>
<body style="height: 100%; width: 100%">

    <div class="square-container">
        <div class="square display-1 unselectable" id="container" onclick="getquestion()">
                START NOW
        </div>
      </div>
</body>

</html>
